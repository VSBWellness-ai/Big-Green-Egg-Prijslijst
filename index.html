<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Big Green Egg — Prijslijst 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#2d6a3f;--green-dark:#1e4d2c;--green-light:#e8f4ee;
  --bg:#f7f5f0;--white:#ffffff;--text:#1a1a16;--muted:#7a7a6e;
  --border:#e0ddd5;--shadow:0 4px 24px rgba(0,0,0,0.08);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-text-size-adjust:100%;}

/* ── TOP BAR ── */
.topbar{background:var(--green);color:white;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(0,0,0,0.2);}
.topbar-brand{display:flex;align-items:center;gap:12px;}
.egg-icon{width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.egg-icon svg{width:22px;height:22px;fill:white;}
.brand-name{font-family:'DM Serif Display',serif;font-size:16px;line-height:1.2;}
.brand-sub{font-size:11px;opacity:0.7;font-weight:300;}
.cart-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:10px;color:white;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:7px;font-family:inherit;}
.cart-btn svg{width:17px;height:17px;stroke:white;fill:none;stroke-width:2;}
.badge{background:white;color:var(--green);border-radius:999px;font-size:11px;font-weight:700;padding:1px 7px;min-width:20px;text-align:center;}

/* ── FILTER ── */
.filter-wrap{background:white;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap;padding:10px 14px;scrollbar-width:none;}
.filter-wrap::-webkit-scrollbar{display:none;}
.filter-btn{display:inline-block;background:transparent;border:1px solid var(--border);border-radius:999px;padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);margin-right:7px;font-family:inherit;transition:all 0.15s;}
.filter-btn.active{background:var(--green);color:white;border-color:var(--green);}

/* ── MAIN ── */
.main{padding:14px 12px 120px;}
.section{margin-bottom:16px;background:white;border-radius:14px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);}
.section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);padding:10px 16px;background:#faf9f6;border-bottom:1px solid var(--border);}

/* ── ITEM ROW ── */
.item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid #f5f3ee;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background 0.12s;position:relative;}
.item:last-child{border-bottom:none;}
.item:hover{background:#faf9f6;}
.item.selected{background:var(--green-light);}
.item-thumb{width:48px;height:48px;object-fit:cover;border-radius:8px;flex-shrink:0;background:#f0ede6;cursor:zoom-in;}
.item-check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.item.selected .item-check{background:var(--green);border-color:var(--green);}
.item-check svg{width:12px;height:12px;stroke:white;fill:none;stroke-width:3;display:none;}
.item.selected .item-check svg{display:block;}
.item-info{flex:1;min-width:0;}
.item-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.3;}
.item-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.item-price{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;}
.item-price.hl{color:var(--green);font-size:14px;}
.qty-ctrl{display:flex;align-items:center;gap:5px;}
.qty-btn{width:24px;height:24px;border-radius:5px;background:#f0ede6;border:none;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);font-family:inherit;}
.qty-btn:active{background:var(--border);}
.qty-num{font-size:12px;font-weight:600;min-width:16px;text-align:center;}
.spec-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:2px 7px;font-size:10px;color:var(--muted);cursor:pointer;font-family:inherit;white-space:nowrap;}
.spec-btn:hover{background:var(--green-light);color:var(--green);border-color:var(--green);}

/* ── LIGHTBOX ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:white;font-size:24px;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}

/* ── SPEC SHEET ── */
.specsheet{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:210;display:none;align-items:flex-end;}
.specsheet.open{display:flex;}
.spec-panel{background:white;border-radius:20px 20px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,0.2);}
.spec-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.spec-head{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;}
.spec-head-img{width:56px;height:56px;object-fit:cover;border-radius:10px;background:#f0ede6;flex-shrink:0;cursor:zoom-in;}
.spec-head-info{flex:1;}
.spec-head-name{font-family:'DM Serif Display',serif;font-size:18px;line-height:1.2;}
.spec-head-code{font-size:12px;color:var(--muted);margin-top:3px;}
.spec-head-price{font-size:18px;font-weight:600;color:var(--green);}
.spec-close{background:none;border:none;font-size:24px;color:var(--muted);cursor:pointer;line-height:1;padding:0 4px;}
.spec-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 18px;}
.spec-section{margin-bottom:18px;}
.spec-section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.spec-item{background:#faf9f6;border-radius:8px;padding:10px 12px;}
.spec-item-label{font-size:10px;color:var(--muted);margin-bottom:3px;font-weight:500;}
.spec-item-value{font-size:13px;font-weight:600;color:var(--text);}
.spec-desc{font-size:13px;line-height:1.6;color:var(--muted);}
.spec-sizes{display:flex;flex-direction:column;gap:6px;}
.spec-size-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#faf9f6;border-radius:8px;}
.spec-size-label{font-size:12px;font-weight:500;}
.spec-size-price{font-size:13px;font-weight:600;color:var(--green);}
.spec-size-code{font-size:11px;color:var(--muted);}
.spec-compatible{font-size:12px;color:var(--muted);background:#faf9f6;border-radius:8px;padding:10px 12px;line-height:1.6;}
.spec-foot{padding:14px 18px;border-top:1px solid var(--border);}
.add-btn{width:100%;background:var(--green);color:white;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
.add-btn.added{background:var(--green-light);color:var(--green);border:1.5px solid var(--green);}

/* ── CART DRAWER ── */
.drawer-ov{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:220;display:none;}
.drawer-ov.open{display:block;}
.drawer{position:fixed;bottom:0;left:0;right:0;background:white;border-radius:20px 20px 0 0;z-index:221;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);max-height:90vh;display:flex;flex-direction:column;}
.drawer.open{transform:translateY(0);}
.drawer-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.drawer-head{padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.drawer-head h2{font-family:'DM Serif Display',serif;font-size:18px;}
.drawer-close{background:none;border:none;font-size:24px;color:var(--muted);cursor:pointer;line-height:1;}
.drawer-clear{font-size:13px;color:#cc3333;background:none;border:none;cursor:pointer;font-family:inherit;}
.drawer-items{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.drawer-empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:14px;line-height:1.8;}
.ci{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid #f5f3ee;}
.ci:last-child{border-bottom:none;}
.ci-img{width:44px;height:44px;border-radius:8px;object-fit:cover;background:#f0ede6;flex-shrink:0;}
.ci-info{flex:1;min-width:0;}
.ci-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ci-code{font-size:11px;color:var(--muted);margin-top:2px;}
.ci-right{text-align:right;flex-shrink:0;}
.ci-price{font-size:13px;font-weight:600;}
.ci-qp{font-size:11px;color:var(--muted);margin-top:1px;}
.ci-rm{background:none;border:none;color:var(--border);font-size:20px;cursor:pointer;padding:0 2px;flex-shrink:0;line-height:1;}
.drawer-foot{border-top:1px solid var(--border);padding:14px 18px;}
.total-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
.total-label{font-size:15px;font-weight:500;}
.total-val{font-family:'DM Serif Display',serif;font-size:24px;color:var(--green);}
.mail-btn{width:100%;background:var(--green);color:white;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
.mail-btn:disabled{background:var(--border);cursor:default;}
.mail-btn svg{width:18px;height:18px;stroke:white;fill:none;stroke-width:2;}
.vsb-logo{height:36px;width:auto;object-fit:contain;}
.topbar-divider{width:1px;height:28px;background:rgba(255,255,255,0.3);margin:0 4px;}

/* ── MAIL MODAL ── */
.mail-ov{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:none;align-items:flex-end;}
.mail-ov.open{display:flex;}
.mail-panel{background:white;border-radius:20px 20px 0 0;width:100%;padding:22px 18px 36px;max-height:85vh;overflow-y:auto;}
.mail-panel h3{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:16px;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.06em;}
.field input,.field textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 12px;font-size:15px;font-family:inherit;color:var(--text);background:white;outline:none;-webkit-appearance:none;}
.field input:focus,.field textarea:focus{border-color:var(--green);}
.field textarea{height:90px;resize:none;}
.mail-btns{display:flex;gap:10px;margin-top:16px;}
.btn-cancel{flex:1;background:#f0ede6;color:var(--text);border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-send{flex:2;background:var(--green);color:white;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.pdf-btn{flex:0 0 auto;background:white;color:var(--green);border:1.5px solid var(--green);border-radius:12px;padding:14px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;}
.pdf-btn:disabled{border-color:var(--border);color:var(--muted);cursor:default;}
</style>
</head>

const LABELS = {
  modellen:"1. Modellen",pakketten:"2. It's a Big Deal — pakketten",
  nests:"3. Nests, Tables & EGG Mates",workspace:"4. Modular EGG Workspace",
  charcoal:"5. Charcoal & Smoking",eggspander:"6. EGGspander System",
  accessoires:"7. Accessoires",tools:"8. Tools",
  onderhoud:"9. Onderhoud",spareparts:"11. Spare Parts",boeken:"12. Boeken"
};

const HL_CATS = ["modellen","pakketten"];
const cart = {};
let currentSpecIdx = null;

// ── HELPERS ──────────────────────────────────────────────────────────────────
function uid(p,i){ return "p"+i; }
function fmt(n){ return "\u20ac\u00a0"+n.toLocaleString("nl-NL",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function imgSrc(p){ return BASE+p.img+"?ext=webp&w=200"; }
function imgLarge(p){ return BASE+p.img+"?ext=webp&w=900"; }
function getFirstPrice(p){ return p.price || (p.sizes && p.sizes[0].price) || 0; }

// ── BUILD LIST ────────────────────────────────────────────────────────────────
function buildList(){
  const c = document.getElementById("sections-container");
  Object.keys(LABELS).forEach(function(cat){
    const ps = PRODUCTS.filter(function(p){ return p.cat===cat; });
    const sec = document.createElement("div");
    sec.className="section"; sec.dataset.cat=cat;
    let h = '<div class="section-title">'+LABELS[cat]+'</div>';
    ps.forEach(function(p,i){
      const idx = PRODUCTS.indexOf(p);
      const hl = HL_CATS.includes(cat);
      const fp = getFirstPrice(p);
      const priceStr = p.sizes ? "v.a. "+fmt(p.sizes[0].price) : fmt(p.price);
      const codeStr = p.code || (p.sizes ? p.sizes[0].code : "");
      h += '<div class="item" data-idx="'+idx+'">';
      h += '<img class="item-thumb" src="'+imgSrc(p)+'" alt="'+p.name+'" loading="lazy" onclick="event.stopPropagation();openLightbox(\''+imgLarge(p)+'\')" onerror="this.style.display=\'none\'">';
      h += '<div class="item-check"><svg viewBox="0 0 12 10"><polyline points="1,5 4,9 11,1"/></svg></div>';
      h += '<div class="item-info">';
      h += '<div class="item-name">'+p.name+'</div>';
      h += '<div class="item-sub">Art. '+codeStr+'</div>';
      h += '</div>';
      h += '<div class="item-right">';
      h += '<div class="item-price'+(hl?' hl':'')+'">'+priceStr+'</div>';
      h += '<div class="qty-ctrl" id="qc_'+idx+'" style="display:none" onclick="event.stopPropagation()">';
      h += '<button class="qty-btn" data-idx="'+idx+'" data-d="-1">\u2212</button>';
      h += '<span class="qty-num" id="qn_'+idx+'">1</span>';
      h += '<button class="qty-btn" data-idx="'+idx+'" data-d="1">+</button>';
      h += '</div>';
      h += '<button class="spec-btn" onclick="event.stopPropagation();openSpec('+idx+')">Details &#8250;</button>';
      h += '</div></div>';
    });
    sec.innerHTML=h;
    c.appendChild(sec);
  });

  // event delegation
  c.addEventListener("click", function(e){
    var qbtn = e.target.closest(".qty-btn");
    if(qbtn){ chQty(parseInt(qbtn.dataset.idx), parseInt(qbtn.dataset.d)); return; }
    var item = e.target.closest(".item");
    if(item){ tog(parseInt(item.dataset.idx)); }
  });
}

// ── TOGGLE ───────────────────────────────────────────────────────────────────
function tog(idx){
  var p = PRODUCTS[idx];
  if(p.sizes && p.sizes.length > 0){
    // Multi-size: open spec sheet for size selection
    openSpec(idx);
    return;
  }
  // Single price: direct toggle
  var el = document.querySelector('.item[data-idx="'+idx+'"]');
  var qc = document.getElementById("qc_"+idx);
  var key = ""+idx;
  if(cart[key]){ delete cart[key]; el.classList.remove("selected"); qc.style.display="none"; }
  else{ cart[key]=1; el.classList.add("selected"); qc.style.display="flex"; }
  updateSpecBtn(idx);
  rc();
}

function chQty(idx,d){
  var key=""+idx;
  if(!cart[key]) return;
  cart[key]=Math.max(1,cart[key]+d);
  document.getElementById("qn_"+idx).textContent=cart[key];
  rc();
}

// Toggle a specific size variant
function togSize(idx, si){
  var key=idx+"_"+si;
  var btn=document.getElementById("sizebtn_"+idx+"_"+si);
  if(cart[key]){
    delete cart[key];
    if(btn){ btn.classList.remove("selected-size"); btn.textContent="+"; }
  } else {
    cart[key]=1;
    if(btn){ btn.classList.add("selected-size"); btn.textContent="✓"; }
  }
  // Update item row highlight
  updateItemRow(idx);
  updateSpecBtn(idx);
  rc();
}

function chSizeQty(idx, si, d){
  var key=idx+"_"+si;
  if(!cart[key]) return;
  cart[key]=Math.max(1,cart[key]+d);
  var el=document.getElementById("sizeqty_"+idx+"_"+si);
  if(el) el.textContent=cart[key];
  rc();
}

function updateItemRow(idx){
  var p=PRODUCTS[idx];
  var el=document.querySelector('.item[data-idx="'+idx+'"]');
  if(!el) return;
  // Check if any size of this product is in cart
  var hasAny=false;
  if(p.sizes){
    p.sizes.forEach(function(sz,si){ if(cart[idx+"_"+si]) hasAny=true; });
  } else {
    if(cart[""+idx]) hasAny=true;
  }
  if(hasAny) el.classList.add("selected");
  else el.classList.remove("selected");
}

function clearCart(){
  Object.keys(cart).forEach(function(k){
    delete cart[k];
    var parts=k.split("_");
    var idx=parseInt(parts[0]);
    var si=parts.length>1?parseInt(parts[1]):null;
    if(si!==null){
      var btn=document.getElementById("sizebtn_"+idx+"_"+si);
      if(btn){btn.classList.remove("selected-size");btn.textContent="+";}
    } else {
      var el=document.querySelector('.item[data-idx="'+idx+'"]'); if(el) el.classList.remove("selected");
      var qc=document.getElementById("qc_"+idx); if(qc) qc.style.display="none";
      var qn=document.getElementById("qn_"+idx); if(qn) qn.textContent="1";
    }
    updateItemRow(idx);
  });
  rc();
}

// ── RENDER CART ───────────────────────────────────────────────────────────────
function rc(){
  var ids=Object.keys(cart);
  var tq=ids.reduce(function(s,i){return s+(cart[i]||0);},0);
  document.getElementById("cart-badge").textContent=tq;
  var tot=ids.reduce(function(s,i){
    var p=PRODUCTS[parseInt(i)];
    var fp=getFirstPrice(p);
    return s+fp*(cart[i]||0);
  },0);
  document.getElementById("drawer-total").textContent=fmt(tot);
  document.getElementById("mail-btn").disabled=!ids.length;
  document.getElementById("pdf-btn").disabled=!ids.length;
  var di=document.getElementById("drawer-items");
  if(!ids.length){di.innerHTML='<div class="drawer-empty">Nog geen producten geselecteerd.<br>Tik op een product of klik op Details.</div>';return;}
  di.innerHTML=ids.map(function(i){
    var p=PRODUCTS[parseInt(i)];
    var qty=cart[i];
    var fp=getFirstPrice(p);
    var sub=fp*qty;
    return '<div class="ci">'+
      '<img class="ci-img" src="'+imgSrc(p)+'" alt="" onerror="this.style.display=\'none\'">'+
      '<div class="ci-info"><div class="ci-name">'+p.name+'</div><div class="ci-code">Art. '+(p.code||"")+' \u00b7 '+LABELS[p.cat]+'</div></div>'+
      '<div class="ci-right"><div class="ci-price">'+fmt(sub)+'</div>'+(qty>1?'<div class="ci-qp">'+qty+' \u00d7 '+fmt(fp)+'</div>':'')+' </div>'+
      '<button class="ci-rm" data-idx="'+i+'">&#215;</button>'+
    '</div>';
  }).join("");
  di.addEventListener("click",function(e){
    var rm=e.target.closest(".ci-rm"); if(rm) tog(parseInt(rm.dataset.idx));
  },{once:true});
}

// ── SPEC SHEET ────────────────────────────────────────────────────────────────
function openSpec(idx){
  currentSpecIdx = idx;
  var p = PRODUCTS[idx];
  document.getElementById("spec-img").src = imgSrc(p);
  document.getElementById("spec-img").setAttribute("data-large", imgLarge(p));
  document.getElementById("spec-name").textContent = p.name;
  document.getElementById("spec-code").textContent = "Art. "+(p.code||"—")+" \u00b7 "+LABELS[p.cat];
  var fp = getFirstPrice(p);
  document.getElementById("spec-price").textContent = p.sizes ? "v.a. "+fmt(p.sizes[0].price) : fmt(p.price);

  var body = "";
  if(p.desc){
    body += '<div class="spec-section"><div class="spec-section-title">Omschrijving</div>';
    body += '<p class="spec-desc">'+p.desc+'</p></div>';
  }
  if(p.specs && Object.keys(p.specs).length){
    body += '<div class="spec-section"><div class="spec-section-title">Specificaties</div><div class="spec-grid">';
    Object.keys(p.specs).forEach(function(k){
      body += '<div class="spec-item"><div class="spec-item-label">'+k.replace(/_/g," ")+'</div><div class="spec-item-value">'+p.specs[k]+'</div></div>';
    });
    body += '</div></div>';
  }
  if(p.sizes){
    body += '<div class="spec-section"><div class="spec-section-title">Kies maat / uitvoering</div><div class="spec-sizes">';
    p.sizes.forEach(function(sz,si){
      var key=idx+"_"+si;
      var inCart=!!cart[key];
      var qty=cart[key]||1;
      body += '<div class="spec-size-row" id="sizerow_'+idx+'_'+si+'">';
      body += '<div><div class="spec-size-label">'+sz.s+'</div><div class="spec-size-code">Art. '+sz.code+'</div></div>';
      body += '<div style="display:flex;align-items:center;gap:8px">';
      body += '<div class="spec-size-price">'+fmt(sz.price)+'</div>';
      if(inCart){
        body += '<div class="size-qty-ctrl">';
        body += '<button class="size-qty-btn" onclick="chSizeQty('+idx+','+si+',-1)">−</button>';
        body += '<span class="size-qty-num" id="sizeqty_'+idx+'_'+si+'">'+qty+'</span>';
        body += '<button class="size-qty-btn" onclick="chSizeQty('+idx+','+si+',1)">+</button>';
        body += '</div>';
      }
      body += '<button id="sizebtn_'+idx+'_'+si+'" class="size-add-btn'+(inCart?' selected-size':'')+'" onclick="togSize('+idx+','+si+')">'+(inCart?'✓':'+')+'</button>';
      body += '</div></div>';
    });
    body += '</div></div>';
  }
  document.getElementById("spec-body").innerHTML = body;
  updateSpecBtn(idx);
  document.getElementById("specsheet").classList.add("open");
  document.body.style.overflow="hidden";
}

function updateSpecBtn(idx){
  var btn = document.getElementById("spec-add-btn");
  var lbl = document.getElementById("spec-add-label");
  if(!btn) return;
  var p=PRODUCTS[idx];
  if(p && p.sizes && p.sizes.length > 0){
    // Multi-size: check if any size selected
    var count=0;
    p.sizes.forEach(function(sz,si){ if(cart[idx+"_"+si]) count++; });
    if(count>0){
      btn.classList.add("added");
      lbl.textContent=count+" maat"+(count>1?"en":"")+" geselecteerd — Sluit";
    } else {
      btn.classList.remove("added");
      lbl.textContent="Kies een maat hierboven";
    }
    return;
  }
  if(cart[""+idx]){
    btn.classList.add("added");
    lbl.textContent="Verwijder uit selectie";
  } else {
    btn.classList.remove("added");
    lbl.textContent="Toevoegen aan selectie";
  }
}

function toggleFromSpec(){
  if(currentSpecIdx === null) return;
  var p=PRODUCTS[currentSpecIdx];
  if(p.sizes && p.sizes.length > 0){
    // For multi-size, the button isn't relevant - sizes handled individually
    // Just close spec
    closeSpec();
    return;
  }
  tog(currentSpecIdx);
}

function closeSpec(){
  document.getElementById("specsheet").classList.remove("open");
  document.body.style.overflow="";
  currentSpecIdx=null;
}

// ── LIGHTBOX ──────────────────────────────────────────────────────────────────
function openLightbox(src){
  document.getElementById("lightbox-img").src=src;
  document.getElementById("lightbox").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeLightbox(){
  document.getElementById("lightbox").classList.remove("open");
  document.body.style.overflow="";
}

// ── FILTER ───────────────────────────────────────────────────────────────────
function filter(cat,btn){
  document.querySelectorAll(".filter-btn").forEach(function(b){b.classList.remove("active");});
  btn.classList.add("active");
  document.querySelectorAll(".section").forEach(function(s){
    s.style.display=(cat==="all"||s.dataset.cat===cat)?"block":"none";
  });
}

// ── DRAWER ───────────────────────────────────────────────────────────────────
function openDrawer(){document.getElementById("drawer").classList.add("open");document.getElementById("drawer-ov").classList.add("open");document.body.style.overflow="hidden";}
function closeDrawer(){document.getElementById("drawer").classList.remove("open");document.getElementById("drawer-ov").classList.remove("open");document.body.style.overflow="";}

// ── MAIL ─────────────────────────────────────────────────────────────────────
function openMail(){document.getElementById("mail-ov").classList.add("open");}
function closeMail(){document.getElementById("mail-ov").classList.remove("open");}
function doMail(){
  var ids=Object.keys(cart);
  var now=new Date().toLocaleDateString("nl-NL",{day:"2-digit",month:"long",year:"numeric"});
  var name=document.getElementById("mail-name").value.trim();
  var note=document.getElementById("mail-note").value.trim();
  var to=document.getElementById("mail-to").value.trim();
  var body="Big Green Egg \u2014 Mijn selectie\nPrijslijst 2026 | "+now+"\n";
  if(name) body+="Samengesteld door: "+name+"\n";
  if(note) body+="\nOpmerking: "+note+"\n";
  body+="\n";
  var tot=0;
  ids.forEach(function(i){
    var p=PRODUCTS[parseInt(i)]; if(!p) return;
    var qty=cart[i]; var fp=getFirstPrice(p); var sub=fp*qty; tot+=sub;
    body+=p.name+" | Art. "+(p.code||"")+"\n  "+qty+"x "+fmt(fp)+" = "+fmt(sub)+"\n";
  });
  body+="\nTOTAAL INCL. BTW: "+fmt(tot)+"\n\nPrijzen onder voorbehoud | biggreenegg.eu";
  window.location.href="mailto:"+encodeURIComponent(to)+"?subject="+encodeURIComponent("Big Green Egg \u2014 Mijn selectie 2026")+"&body="+encodeURIComponent(body);
  closeMail();
}

<title>BGE Prijslijst 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;-webkit-text-size-adjust:100%;}

/* TOP BAR */
.topbar{background:#2d6a3f;color:white;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.egg-logo{width:34px;height:34px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.egg-logo svg{width:20px;height:20px;fill:white;}
.topbar h1{font-size:15px;font-weight:700;line-height:1.2;}
.topbar p{font-size:11px;opacity:0.75;}
.cart-btn{background:rgba(255,255,255,0.2);border:none;border-radius:10px;color:white;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;font-family:inherit;}
.cart-btn svg{width:18px;height:18px;stroke:white;fill:none;stroke-width:2;}
.badge{background:white;color:#2d6a3f;border-radius:999px;font-size:11px;font-weight:700;padding:1px 7px;min-width:20px;text-align:center;}

/* FILTER */
.filter-wrap{background:white;border-bottom:1px solid #e8e6df;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap;padding:10px 12px;}
.filter-btn{display:inline-block;background:transparent;border:1px solid #dddbd2;border-radius:999px;padding:6px 13px;font-size:12px;cursor:pointer;color:#6b6b66;margin-right:6px;font-family:inherit;white-space:nowrap;}
.filter-btn.active{background:#2d6a3f;color:white;border-color:#2d6a3f;}

/* LIST */
.main{padding:12px 12px 120px;}
.section{margin-bottom:14px;background:white;border-radius:12px;border:1px solid #e8e6df;overflow:hidden;}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#6b6b66;padding:10px 14px;background:#faf9f6;border-bottom:1px solid #e8e6df;}
.item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid #f0ede6;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background 0.1s;}
.item:last-child{border-bottom:none;}
.item.selected{background:#f0f7f2;}
.item-check{width:22px;height:22px;border-radius:6px;border:1.5px solid #dddbd2;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.item.selected .item-check{background:#2d6a3f;border-color:#2d6a3f;}
.item-check svg{width:13px;height:13px;stroke:white;fill:none;stroke-width:3;display:none;}
.item.selected .item-check svg{display:block;}
.item-info{flex:1;min-width:0;}
.item-name{font-size:13px;font-weight:500;color:#1a1a18;}
.item-sub{font-size:11px;color:#9b9b96;margin-top:1px;}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.item-price{font-size:13px;font-weight:700;color:#1a1a18;white-space:nowrap;}
.item-price.hl{color:#2d6a3f;}
.qty-ctrl{display:flex;align-items:center;gap:6px;}
.qty-btn{width:26px;height:26px;border-radius:6px;background:#f0ede6;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#1a1a18;font-family:inherit;line-height:1;}
.qty-btn:active{background:#dddbd2;}
.qty-num{font-size:13px;font-weight:600;min-width:18px;text-align:center;}

/* CART DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;opacity:0;transition:opacity 0.25s;}
.drawer-overlay.open{display:block;opacity:1;}
.drawer{position:fixed;bottom:0;left:0;right:0;background:white;border-radius:18px 18px 0 0;z-index:201;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);max-height:90vh;display:flex;flex-direction:column;}
.drawer.open{transform:translateY(0);}
.drawer-handle{width:36px;height:4px;background:#dddbd2;border-radius:2px;margin:10px auto 0;}
.drawer-head{padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f0ede6;}
.drawer-head h2{font-size:17px;font-weight:700;}
.drawer-close{background:none;border:none;font-size:22px;color:#9b9b96;cursor:pointer;padding:0 4px;line-height:1;}
.drawer-clear{font-size:13px;color:#cc3333;background:none;border:none;cursor:pointer;font-family:inherit;}
.drawer-items{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.drawer-empty{padding:40px 20px;text-align:center;color:#b8b5ac;font-size:14px;line-height:1.7;}
.ci{display:flex;align-items:flex-start;gap:10px;padding:12px 18px;border-bottom:1px solid #f5f4f0;}
.ci:last-child{border-bottom:none;}
.ci-info{flex:1;min-width:0;}
.ci-name{font-size:13px;font-weight:500;color:#1a1a18;}
.ci-code{font-size:11px;color:#9b9b96;margin-top:2px;}
.ci-right{text-align:right;flex-shrink:0;}
.ci-price{font-size:13px;font-weight:700;color:#1a1a18;}
.ci-qp{font-size:11px;color:#9b9b96;margin-top:2px;}
.ci-rm{background:none;border:none;color:#dddbd2;font-size:20px;line-height:1;cursor:pointer;padding:0 2px;flex-shrink:0;margin-top:-2px;}
.drawer-foot{padding:14px 18px;border-top:1px solid #e8e6df;}
.total-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
.total-label{font-size:15px;font-weight:600;}
.total-val{font-size:22px;font-weight:700;color:#2d6a3f;}
.btn-mail{width:100%;background:#2d6a3f;color:white;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-mail:disabled{background:#dddbd2;cursor:default;}
.btn-mail svg{width:20px;height:20px;stroke:white;fill:none;stroke-width:2;}

/* MAIL MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:18px 18px 0 0;width:100%;padding:20px 18px 34px;max-height:85vh;overflow-y:auto;}
.modal h3{font-size:17px;font-weight:700;margin-bottom:14px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:600;color:#6b6b66;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em;}
.field input,.field textarea{width:100%;border:1.5px solid #dddbd2;border-radius:10px;padding:11px 12px;font-size:15px;font-family:inherit;color:#1a1a18;background:white;outline:none;-webkit-appearance:none;}
.field input:focus,.field textarea:focus{border-color:#2d6a3f;}
.field textarea{height:90px;resize:none;}
.modal-btns{display:flex;gap:10px;margin-top:16px;}
.btn-cancel{flex:1;background:#f0ede6;color:#1a1a18;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-send{flex:2;background:#2d6a3f;color:white;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}

.hidden{display:none!important;}
</style>

</div>

const LABELS={modellen:"1. Modellen",pakketten:"2. It's a Big Deal — pakketten",nests:"3. Nests, Tables & EGG Mates",workspace:"4. Modular EGG Workspace",charcoal:"5. Charcoal & Smoking",eggspander:"6. EGGspander System",accessoires:"7. Accessoires",tools:"8. Tools",onderhoud:"9. Onderhoud",spareparts:"11. Spare Parts",boeken:"12. Boeken"};
const HI=["modellen","pakketten"];
const cart={};

function uid(p){return p[0]+"_"+p[2]+"_"+p[1].replace(/\s/g,"");}
function fmt(n){return"€ "+n.toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".");}
function getP(id){return PRODUCTS.find(p=>uid(p)===id);}

function buildList(){
  const c=document.getElementById("sections-container");
  Object.keys(LABELS).forEach(cat=>{
    const ps=PRODUCTS.filter(p=>p[0]===cat);
    const sec=document.createElement("div");
    sec.className="section";sec.dataset.cat=cat;
    let h=`<div class="section-title">${LABELS[cat]}</div>`;
    ps.forEach(p=>{
      const id=uid(p);
      const hl=HI.includes(p[0]);
      const sz=p[4]?`<span style="font-size:10px;background:#f0ede6;border-radius:3px;padding:1px 5px;color:#9b9b96;margin-right:3px">${p[4]}</span>`:"";
      h+=`<div class="item" data-uid="${id}" onclick="toggle('${id}')">
        <div class="item-check"><svg viewBox="0 0 12 10"><polyline points="1,5 4,9 11,1"/></svg></div>
        <div class="item-info">
          <div class="item-name">${p[1]}</div>
          <div class="item-sub">${sz}Art. ${p[2]}</div>
        </div>
        <div class="item-right">
          <div class="item-price${hl?" hl":""}">${fmt(p[3])}</div>
          <div class="qty-ctrl" id="qc_${id}" style="display:none" onclick="event.stopPropagation()">
            <button class="qty-btn" onclick="chQty('${id}',-1)">−</button>
            <span class="qty-num" id="qn_${id}">1</span>
            <button class="qty-btn" onclick="chQty('${id}',1)">+</button>
          </div>
        </div>
      </div>`;
    });
    sec.innerHTML=h;c.appendChild(sec);
  });
}

function toggle(id){
  const el=document.querySelector(`.item[data-uid="${id}"]`);
  const qc=document.getElementById("qc_"+id);
  if(cart[id]){delete cart[id];el.classList.remove("selected");qc.style.display="none";}
  else{cart[id]=1;el.classList.add("selected");qc.style.display="";}
  renderCart();
}

function chQty(id,d){
  if(!cart[id])return;
  cart[id]=Math.max(1,cart[id]+d);
  document.getElementById("qn_"+id).textContent=cart[id];
  renderCart();
}

function clearCart(){
  Object.keys(cart).forEach(id=>{
    delete cart[id];
    const el=document.querySelector(`.item[data-uid="${id}"]`);
    if(el)el.classList.remove("selected");
    const qc=document.getElementById("qc_"+id);
    if(qc)qc.style.display="none";
    const qn=document.getElementById("qn_"+id);
    if(qn)qn.textContent="1";
  });
  renderCart();
}

function renderCart(){
  const ids=Object.keys(cart);
  const total=ids.reduce((s,id)=>{const p=getP(id);return p?s+p[3]*cart[id]:s;},0);
  const totalQty=ids.reduce((s,id)=>s+cart[id],0);
  document.getElementById("cart-badge").textContent=totalQty;
  document.getElementById("drawer-total").textContent=fmt(total);
  document.getElementById("btn-mail").disabled=ids.length===0;
  const di=document.getElementById("drawer-items");
  if(!ids.length){di.innerHTML=`<div class="drawer-empty">Nog geen producten geselecteerd.<br>Tik op een product in de lijst.</div>`;return;}
  di.innerHTML=ids.map(id=>{
    const p=getP(id);if(!p)return"";
    const qty=cart[id];const sub=p[3]*qty;
    const sz=p[4]?` — ${p[4]}`:"";
    return`<div class="ci">
      <div class="ci-info"><div class="ci-name">${p[1]}${sz}</div><div class="ci-code">Art. ${p[2]}</div></div>
      <div class="ci-right"><div class="ci-price">${fmt(sub)}</div>${qty>1?`<div class="ci-qp">${qty} x ${fmt(p[3])}</div>`:""}</div>
      <button class="ci-rm" onclick="toggle('${id}')">×</button>
    </div>`;
  }).join("");
}

function filter(cat,btn){
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".section").forEach(s=>s.style.display=(cat==="all"||s.dataset.cat===cat)?"block":"none");
}

function openDrawer(){
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawer-overlay").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeDrawer(){
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawer-overlay").classList.remove("open");
  document.body.style.overflow="";
}

function openMailModal(){document.getElementById("mail-modal").classList.add("open");}
function closeMailModal(){document.getElementById("mail-modal").classList.remove("open");}

function buildMailBody(){
  const ids=Object.keys(cart);
  const now=new Date().toLocaleDateString("nl-NL",{day:"2-digit",month:"long",year:"numeric"});
  const name=document.getElementById("mail-from-name").value.trim();
  const note=document.getElementById("mail-note").value.trim();
  let body="Big Green Egg — Mijn selectie\n";
  body+="Prijslijst 2026 | "+now+"\n";
  if(name)body+="Samengesteld door: "+name+"\n";
  if(note)body+="\nOpmerking: "+note+"\n";
  body+="\n";
  body+="PRODUCT                          ART.NR.    AANTAL    PRIJS\n";
  body+="------------------------------------------------------------\n";
  let total=0;
  ids.forEach(id=>{
    const p=getP(id);if(!p)return;
    const qty=cart[id];const sub=p[3]*qty;total+=sub;
    const sz=p[4]?" ("+p[4]+")":"";
    const nm=(p[1]+sz).substring(0,32).padEnd(32);
    const cd=p[2].padEnd(10);
    const qt=String(qty).padStart(6);
    const pr=fmt(sub).padStart(12);
    body+=nm+" "+cd+qt+pr+"\n";
  });
  body+="------------------------------------------------------------\n";
  body+="TOTAAL INCL. BTW".padEnd(51)+fmt(ids.reduce((s,id)=>{const p=getP(id);return p?s+p[3]*cart[id]:s;},0)).padStart(12)+"\n";
  body+="\nPrijzen onder voorbehoud | biggreenegg.eu";
  return body;
}

function sendMail(){
  const to=document.getElementById("mail-to").value.trim();
  const subject=encodeURIComponent("Big Green Egg — Mijn selectie 2026");
  const body=encodeURIComponent(buildMailBody());
  const mailto=`mailto:${encodeURIComponent(to)}?subject=${subject}&body=${body}`;
  window.location.href=mailto;
  closeMailModal();
}

buildList();renderCart();
